name: Build and Deploy Angular App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and Prerender Angular app (Production)
        run: |
          # Angular 19 application builder automatically prerenders with outputMode: "static"
          npm run build -- --configuration production

      - name: Prepare deployment files
        run: |
          # Copy index.html to 404.html for GitHub Pages SPA routing
          cp dist/laci-climate-frontend/browser/index.html dist/laci-climate-frontend/browser/404.html

          # Create CNAME file for custom domain
          echo "mitrikhutes.hu" > dist/laci-climate-frontend/browser/CNAME

          # Verify important files exist
          ls -la dist/laci-climate-frontend/browser/
          echo "Checking for prerendered pages:"
          ls -la dist/laci-climate-frontend/browser/hu/ || echo "Warning: /hu not found"
          ls -la dist/laci-climate-frontend/browser/en/ || echo "Warning: /en not found"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/laci-climate-frontend/browser
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
