<a href="#main-content" class="skip-link">
  {{ "A11Y.SKIP_TO_CONTENT" | translate }}
</a>

<div
  class="scrollable flex justify-between items-center gap-4 p-4 border-bottom bg-surface-50 dark:bg-surface-800"
>
  <!-- Logo and Mobile Menu -->
  <div class="flex items-center gap-4">
    <p-button
      icon="pi pi-bars"
      variant="text"
      (onClick)="drawerVisible.set(true)"
      class="lg:hidden"
      [title]="'HEADER.NAVIGATION' | translate"
    ></p-button>

    <div
      class="h-10 cursor-pointer"
      style="
        width: 120px;
        background-color: var(--p-button-primary-background);
        mask-image: url(assets/images/logo.svg);
        -webkit-mask-image: url(assets/images/logo.svg);
        mask-size: contain;
        -webkit-mask-size: contain;
        mask-repeat: no-repeat;
        -webkit-mask-repeat: no-repeat;
        mask-position: center;
        -webkit-mask-position: center;
      "
      [attr.aria-label]="'Mitrik Hűtés Logo'"
      (click)="scrollToTop()"
    ></div>
  </div>

  <!-- Desktop Navigation -->
  <nav class="hidden lg:flex gap-2 items-center">
    <a href="#szolgaltatasok" (click)="scrollToSection('szolgaltatasok', $event)">
      <p-button
        [label]="'SERVICES.TITLE' | translate"
        icon="pi pi-wrench"
        variant="text"
        [raised]="true"
      ></p-button>
    </a>
    <a href="#arak" (click)="scrollToSection('arak', $event)">
      <p-button
        [label]="'PRICING.TITLE' | translate"
        icon="pi pi-tag"
        variant="text"
        [raised]="true"
      ></p-button>
    </a>
    <a href="#ugyfeltipusok" (click)="scrollToSection('ugyfeltipusok', $event)">
      <p-button
        [label]="'CLIENT_TYPES.TITLE' | translate"
        icon="pi pi-users"
        variant="text"
        [raised]="true"
      ></p-button>
    </a>
    <a href="#kapcsolat" (click)="scrollToSection('kapcsolat', $event)">
      <p-button
        [label]="'CONTACT.TITLE' | translate"
        icon="pi pi-envelope"
        variant="text"
        [raised]="true"
      ></p-button>
    </a>
    <a href="#gyakori-kerdesek" (click)="scrollToSection('gyakori-kerdesek', $event)">
      <p-button
        [label]="getFaqLabel()"
        icon="pi pi-question-circle"
        variant="text"
        [raised]="true"
        pTooltip="{{ 'FAQ.MENU_TOOLTIP' | translate }}"
        tooltipPosition="right"
      ></p-button>
    </a>
  </nav>

  <!-- Mobile Drawer -->
  <p-drawer
    [(visible)]="drawerVisible"
    position="left"
    [modal]="true"
    styleClass="w-80"
  >
    <ng-template #header>
      <div class="flex items-center justify-between w-full">
        <span class="text-xl font-bold">{{
          "HEADER.NAVIGATION" | translate
        }}</span>
      </div>
    </ng-template>

    <div class="flex flex-col gap-2 py-4">
      <a href="#szolgaltatasok" (click)="scrollToSection('szolgaltatasok', $event)">
        <p-button
          [label]="'SERVICES.TITLE' | translate"
          icon="pi pi-wrench"
          variant="text"
          [raised]="true"
          styleClass="w-full justify-start"
        ></p-button>
      </a>
      <a href="#arak" (click)="scrollToSection('arak', $event)">
        <p-button
          [label]="'PRICING.TITLE' | translate"
          icon="pi pi-tag"
          variant="text"
          [raised]="true"
          styleClass="w-full justify-start"
        ></p-button>
      </a>
      <a href="#ugyfeltipusok" (click)="scrollToSection('ugyfeltipusok', $event)">
        <p-button
          [label]="'CLIENT_TYPES.TITLE' | translate"
          icon="pi pi-users"
          variant="text"
          [raised]="true"
          styleClass="w-full justify-start"
        ></p-button>
      </a>
      <a href="#kapcsolat" (click)="scrollToSection('kapcsolat', $event)">
        <p-button
          [label]="'CONTACT.TITLE' | translate"
          icon="pi pi-envelope"
          variant="text"
          [raised]="true"
          styleClass="w-full justify-start"
        ></p-button>
      </a>
      <a href="#gyakori-kerdesek" (click)="scrollToSection('gyakori-kerdesek', $event)">
        <p-button
          [label]="getFaqLabel()"
          icon="pi pi-question-circle"
          variant="text"
          [raised]="true"
          styleClass="w-full justify-start"
        ></p-button>
      </a>
    </div>
  </p-drawer>

  <div class="flex gap-4 items-center">
    <p-button
      *ngIf="showSnowfallButton()"
      label="❄️"
      (onClick)="toggleSnowfall()"
      [title]="
        snowfallActive()
          ? ('SNOWFALL.OFF' | translate)
          : ('SNOWFALL.ON' | translate)
      "
      severity="secondary"
      [raised]="true"
    ></p-button>
    <p-button
      [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      (onClick)="toggleDark()"
    ></p-button>

    <p-select
      #languageSelectRef
      [options]="languages"
      [(ngModel)]="selectedLanguage"
      optionLabel="name"
      [filter]="false"
      [showClear]="false"
      [placeholder]="'HEADER.SELECT_LANGUAGE' | translate"
      class="w-full lg:w-40"
      (onChange)="onLanguageChange($event, languageSelectRef)"
    >
      <ng-template #selectedItem let-selectedOption>
        <div class="flex items-center gap-2">
          <img
            [src]="getFlagUrl(selectedOption.code)"
            [alt]="
              selectedOption.code === 'hu'
                ? ('IMAGES.FLAG_HU' | translate)
                : ('IMAGES.FLAG_EN' | translate)
            "
            style="width: 18px; height: 12px; object-fit: cover"
          />
          <div>{{ selectedOption.name }}</div>
        </div>
      </ng-template>
      <ng-template let-lang #item>
        <div class="flex items-center gap-2">
          <img
            [src]="getFlagUrl(lang.code)"
            [alt]="
              lang.code === 'hu'
                ? ('IMAGES.FLAG_HU' | translate)
                : ('IMAGES.FLAG_EN' | translate)
            "
            style="width: 18px; height: 12px; object-fit: cover"
          />
          <div>{{ lang.name }}</div>
        </div>
      </ng-template>
    </p-select>
  </div>
</div>
