<div class="p-2flex items-center justify-center surface-border">
  <div class="flex flex-col items-center justify-center m-5 gap-4">
    <!-- Trust Badges -->
    <div class="flex flex-wrap justify-center gap-6 mb-2">
      <div class="flex items-center gap-2 text-sm text-muted-color">
        <i class="pi pi-check-circle text-green-500"></i>
        <span>{{ "TRUST.CERTIFIED" | translate }}</span>
      </div>
      <div class="flex items-center gap-2 text-sm text-muted-color">
        <i class="pi pi-shield text-blue-500"></i>
        <span>{{ "TRUST.INSURED" | translate }}</span>
      </div>
      <div class="flex items-center gap-2 text-sm text-muted-color">
        <i class="pi pi-users text-primary"></i>
        <span>{{ "TRUST.EXPERIENCE" | translate }}</span>
      </div>
    </div>

    <p
      class="text-center text-muted-color text-sm sm:text-base mb-2 px-2 sm:px-0"
    >
      © {{ currentYear }} Mitrik László — {{ "FOOTER.ALL_RIGHTS" | translate }}.
    </p>
    <p
      class="text-muted-color text-xs sm:text-sm px-2 sm:px-0 flex items-center justify-center gap-1.5"
    >
      <i class="pi pi-github"></i>
      {{ "FOOTER.MADE_BY" | translate }}
      <a
        [href]="githubUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="text-primary hover:text-primary-600 dark:hover:text-primary-400 transition-colors underline hover:no-underline"
      >
        nagymarten
      </a>
    </p>
  </div>
</div>
